version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: atmosnet-postgres
    environment:
      POSTGRES_USER: atmosnet
      POSTGRES_PASSWORD: atmosnet
      POSTGRES_DB: atmosnet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atmosnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: atmosnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Kafka (single node for local dev)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: atmosnet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: atmosnet-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Kafka UI (optional, for debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: atmosnet-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atmosnet-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://atmosnet:atmosnet@postgres:5432/atmosnet
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      ENVIRONMENT: development
      DEBUG: "true"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Validation Engine (background worker)
  validation-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atmosnet-validation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://atmosnet:atmosnet@postgres:5432/atmosnet
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      ENVIRONMENT: development
    volumes:
      - ./backend/app:/app/app
      - ./backend/workers:/app/workers
    command: python workers/validation_engine.py

  # Grid Model (runs every 10 minutes)
  grid-model:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atmosnet-grid
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atmosnet:atmosnet@postgres:5432/atmosnet
      REDIS_URL: redis://redis:6379/0
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      ENVIRONMENT: development
    volumes:
      - ./backend/app:/app/app
      - ./backend/workers:/app/workers
    command: python workers/grid_model.py

  # Points Ledger (processes validated observations)
  points-ledger:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atmosnet-points
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://atmosnet:atmosnet@postgres:5432/atmosnet
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ENVIRONMENT: development
    volumes:
      - ./backend/app:/app/app
      - ./backend/workers:/app/workers
    command: python workers/points_ledger.py

volumes:
  postgres_data:
  redis_data:
